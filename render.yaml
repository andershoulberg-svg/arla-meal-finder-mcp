services:
  - type: web
    name: arla-meal-finder-mcp
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: ARLA_FETCH_TIMEOUT_MS
        value: "12000"
      - key: ARLA_CANDIDATE_FETCH_LIMIT
        value: "18"
      - key: MCP_AUTH_TOKEN
        sync: false
