services:
  - type: web
    name: arla-meal-finder-mcp
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: MCP_AUTH_TOKEN
        sync: false
